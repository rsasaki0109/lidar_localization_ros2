mode: run
dataset:
  bag_path: /media/sasaki/aiueo/datasets/koide_hard_localization/sequences/outdoor_hard_01a
  map_path: /media/sasaki/aiueo/datasets/koide_hard_localization/map_outdoor_hard.ply
  reference_csv: /media/sasaki/aiueo/datasets/koide_hard_localization/generated/localization_gif_benchmarks/assets/outdoor_hard_01a_reference.csv
