mode: run
dataset:
  bag_path: /media/sasaki/aiueo/datasets/koide_hard_localization/sequences/outdoor_hard_02b
  map_path: /media/sasaki/aiueo/datasets/koide_hard_localization/map_outdoor_hard.ply
  reference_csv: /media/sasaki/aiueo/datasets/koide_hard_localization/generated/localization_gif_benchmarks/assets/outdoor_hard_02b_reference.csv
  initial_pose_yaml: /media/sasaki/aiueo/datasets/koide_hard_localization/generated/localization_gif_benchmarks/assets/outdoor_hard_02b_initial_pose.yaml
  cloud_topic: /livox/points
  imu_topic: /livox/imu
system:
  command: >-
    env
    OUT_DIR=/tmp/glimfrontend_runs/outdoor_hard_02b_rotation_rate_guard_150
    ROS_DOMAIN_ID=100
    LOCALIZER_SCORE_THRESHOLD=10.0
    ENABLE_BORDERLINE_SEED_REJECTION_GATE=false
    ENABLE_MAP_ODOM_ANCHOR_FITNESS_GATE=true
    MAP_ODOM_ANCHOR_MAX_FITNESS=1.5
    INITIAL_POSE_YAML=/media/sasaki/aiueo/datasets/koide_hard_localization/generated/localization_gif_benchmarks/assets/outdoor_hard_02b_initial_pose.yaml
    /home/sasaki/workspace/old_~2026/lidarloc_ws/src/lidar_localization_ros2/experiments/koide_glim_frontend_localization/glim_frontend_system.sh
benchmark:
  output_dir: /tmp/glimfrontend_runs/outdoor_hard_02b_rotation_rate_guard_150
  ros_domain_id: 100
  bag_duration: 154.0
  bag_start_offset: 0.0
  settle_seconds: 12
  post_roll_seconds: 1
  max_time_diff: 0.05
  record_qos_reliability: reliable
  record_qos_durability: volatile
  record_use_sim_time: true
  bag_command: >-
    ros2 bag play
    /media/sasaki/aiueo/datasets/koide_hard_localization/sequences/outdoor_hard_02b
    --clock --rate 1.0 --delay 3 --playback-duration 150
    --qos-profile-overrides-path
    /home/sasaki/workspace/old_~2026/lidarloc_ws/src/lidar_localization_ros2/experiments/koide_glim_frontend_localization/reliable_sensor_qos.profiles
