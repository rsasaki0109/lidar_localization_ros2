# Boreas 60 s conservative cliff sweep (keep borderline gate unless noted).

mode: sweep

dataset:
  bag_path: $workspace/arxiv/lidarloc_ws/data/boreas/boreas-2021-09-02-11-42_rosbag2
  map_path: /tmp/boreas_mapping_gt_map_rebuild_loc_frame.pcd
  reference_csv: $workspace/arxiv/lidarloc_ws/data/boreas/boreas-2021-09-02-11-42_reference.csv
  initial_pose_yaml: $workspace/arxiv/lidarloc_ws/data/boreas/boreas-2021-09-02-11-42_initial_pose.yaml
  cloud_topic: /velodyne_points
  imu_topic: /imu/data
  twist_topic: /vehicle/twist

localizer:
  base_param_yaml: repo://param/nav2_ndt_urban.yaml
  param_overrides:
    use_imu: false
    use_imu_preintegration: false
    use_twist_prediction: true
    enable_scan_voxel_filter: true
    voxel_leaf_size: 1.0
  launch_args:
    - use_sim_time:=true
    - lidar_frame_id:=velodyne

benchmark:
  output_dir: /tmp/lidarloc_boreas_localization_60s_cliff_conservative
  config_json: repo://param/benchmark/boreas_localization_60s_cliff_conservative.json
  ros_domain_base: 176
  bag_duration: 60
  bag_start_offset: 0
  settle_seconds: 10
  post_roll_seconds: 3
  max_time_diff: 0.5
  record_qos_reliability: reliable
  record_qos_durability: volatile
  record_use_sim_time: true
