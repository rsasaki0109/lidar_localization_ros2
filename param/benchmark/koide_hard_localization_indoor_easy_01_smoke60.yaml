# Koide Hard Point Cloud Localization — indoor_easy_01 60 s smoke.
# Requires data staged under data/public/koide_hard_localization.

mode: run

dataset:
  bag_path: repo://data/public/koide_hard_localization/sequences/indoor_easy_01/indoor_easy_01
  map_path: repo://data/public/koide_hard_localization/map_indoor_easy.ply
  reference_csv: repo://data/public/koide_hard_localization/benchmark/indoor_easy_01/reference.csv
  initial_pose_yaml: repo://data/public/koide_hard_localization/benchmark/indoor_easy_01/initial_pose.yaml
  cloud_topic: /points2/decompressed
  imu_topic: /imu

localizer:
  base_param_yaml: repo://param/koide_indoor_ndt.yaml
  param_overrides:
    enable_scan_voxel_filter: true
    voxel_leaf_size: 0.7
    base_frame_id: depth_camera_link
    score_threshold: 15.0
  launch_args:
    - use_sim_time:=true
    - use_dataset_tf_tree:=false
    - lidar_frame_id:=depth_camera_link

benchmark:
  output_dir: /tmp/lidarloc_koide_indoor_easy_01_smoke60
  ros_domain_id: 177
  bag_duration: 60
  bag_start_offset: 0
  settle_seconds: 5
  post_roll_seconds: 1
  max_time_diff: 0.05
  record_qos_reliability: reliable
  record_qos_durability: volatile
  record_use_sim_time: true
