# Boreas localization 120 s crop-policy sweep.
# Compare local_map_crop disabled / wider radius against the current baseline.

mode: sweep

dataset:
  bag_path: $workspace/arxiv/lidarloc_ws/data/boreas/boreas-2021-09-02-11-42_rosbag2
  map_path: $workspace/arxiv/lidarloc_ws/data/boreas/boreas_mapping_gt_map.pcd
  reference_csv: $workspace/arxiv/lidarloc_ws/data/boreas/boreas-2021-09-02-11-42_reference.csv
  initial_pose_yaml: $workspace/arxiv/lidarloc_ws/data/boreas/boreas-2021-09-02-11-42_initial_pose.yaml
  cloud_topic: /velodyne_points
  imu_topic: /imu/data
  twist_topic: /vehicle/twist

localizer:
  base_param_yaml: repo://param/nav2_ndt_urban.yaml
  param_overrides:
    use_imu: false
    use_imu_preintegration: false
    use_twist_prediction: true
    enable_scan_voxel_filter: true
    voxel_leaf_size: 1.0
  launch_args: []

benchmark:
  output_dir: /tmp/lidarloc_boreas_localization_120s_crop_compare
  config_json: repo://param/benchmark/boreas_localization_120s_crop_compare.json
  ros_domain_base: 152
  bag_duration: 120
  bag_start_offset: 0
  settle_seconds: 10
  post_roll_seconds: 3
  max_time_diff: 0.5
  record_qos_reliability: reliable
  record_qos_durability: volatile
