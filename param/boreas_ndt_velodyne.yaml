# Boreas Velodyne 128 localizer preset.
# Tuned for map-split GT-aligned maps and high-rate dense scans.
# Keep twist prediction enabled; improve throughput and post-reject recovery.

/**:
  ros__parameters:
    registration_method: NDT_OMP
    score_threshold: 6.0
    ndt_resolution: 1.0
    ndt_step_size: 0.1
    ndt_num_threads: 8
    ndt_max_iterations: 25
    transform_epsilon: 0.01
    voxel_leaf_size: 1.5
    enable_scan_voxel_filter: true
    scan_max_range: 80.0
    scan_min_range: 1.0
    scan_period: 0.1
    cloud_queue_depth: 1
    min_scan_interval_sec: 0.0
    use_pcd_map: true
    map_path: ""
    set_initial_pose: false
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_z: 0.0
    initial_pose_qx: 0.0
    initial_pose_qy: 0.0
    initial_pose_qz: 0.0
    initial_pose_qw: 1.0
    use_odom: false
    use_twist_prediction: true
    twist_prediction_use_angular_velocity: false
    max_twist_prediction_dt: 0.1
    use_imu: false
    use_imu_preintegration: false
    enable_debug: false
    predict_pose_from_previous_delta: true
    enable_local_map_crop: true
    local_map_radius: 300.0
    local_map_min_points: 100
    reject_above_score_threshold: true
    enable_borderline_seed_rejection_gate: true
    borderline_seed_gate_score_threshold: 5.25
    borderline_seed_gate_min_seed_translation_m: 1.0
    enable_post_reject_strict_score_threshold: true
    post_reject_strict_min_rejections: 5
    post_reject_strict_score_threshold: 5.5
    enable_rejected_seed_update: true
    rejected_seed_update_min_rejections: 3
    rejected_seed_update_max_fitness: 6.0
    rejected_seed_update_max_correction_translation_m: 2.0
    rejected_seed_update_max_correction_yaw_deg: 5.0
    enable_reinitialization_request_output: true
    enable_reinitialization_request_latch: true
    reinitialization_trigger_threshold: 0.95
    reinitialization_trigger_gap_scale_sec: 30.0
    reinitialization_trigger_seed_translation_scale_m: 100.0
    reinitialization_trigger_reject_streak_scale: 200.0
    reinitialization_trigger_fitness_explosion_threshold: 1000.0
    enable_map_odom_tf: false
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_link
    enable_timer_publishing: false
    pose_publish_frequency: 30.0
